<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Défi Audit 60s - NovaSuite Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .loader { border-top-color: #00ff41; animation: spinner 1.5s linear infinite; border-radius: 50%; border-width: 4px; border-style: solid; border-color: #111; border-top-color: #00ff41; height: 3rem; width: 3rem; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative pt-10">
    <div class="absolute inset-0 z-0" style="background-image: radial-gradient(circle at center, rgba(34,197,94,0.08) 0%, transparent 70%);"></div>

    <div id="audit-form-container" class="glass p-10 rounded-2xl text-center w-full max-w-md z-10 relative border-t-2 border-green-500 shadow-2xl">
        <h2 class="text-3xl font-black text-white mb-2 tracking-tight">DÉFI AUDIT <span class="text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]">60S</span></h2>
        <p class="text-gray-400 text-sm mb-8 italic">Vérifiez votre conformité Loi 25 en un clic.</p>
        
        <form id="audit-form">
            <div class="text-left mb-4">
                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">URL de l'entreprise</label>
                <input type="url" id="target_url" placeholder="https://clinique-exemple.ca" required class="w-full p-4 mt-1 bg-black border border-gray-800 rounded-lg text-white focus:border-green-500 outline-none transition duration-300">
            </div>
            <div class="text-left mb-8">
                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">Votre Courriel Professionnel</label>
                <input type="email" id="client_email" placeholder="directeur@domaine.com" required class="w-full p-4 mt-1 bg-black border border-gray-800 rounded-lg text-white focus:border-green-500 outline-none transition duration-300">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-green-500 text-black font-black py-4 rounded-lg hover:bg-green-400 transition-all duration-300 shadow-[0_0_20px_rgba(34,197,94,0.3)]">
                LANCER LE DIAGNOSTIC GRATUIT
            </button>
        </form>

        <div id="loading-zone" class="hidden flex-col items-center mt-6">
            <div class="loader mb-4 mx-auto"></div>
            <p class="text-green-400 text-sm font-mono animate-pulse">Analyse des vecteurs d'attaque...</p>
        </div>

        <div style="margin-top: 20px;"><a href="/" style="color:#888; text-decoration: none; font-size: 12px;">← Retour à l'accueil</a></div>
    </div>

    <div id="result-container" class="hidden glass p-8 max-w-3xl w-full rounded-xl border-l-4 border-green-500 shadow-2xl z-20">
        <h2 class='text-2xl font-bold text-white mb-6 flex items-center gap-3'>🔒 Rapport d'Audit Loi 25 - POC</h2>
        <pre id="audit-report" class='text-green-400 font-mono text-sm overflow-x-auto p-4 bg-black rounded whitespace-pre-wrap leading-relaxed border border-green-900/30'></pre>
        <div class='mt-8 text-center'>
            <a href='https://buy.stripe.com/00w8wPaPMfxgcthaKW2VG05' class='inline-block w-full bg-green-500 text-black font-black py-4 rounded text-lg hover:bg-green-400 transition transform hover:scale-105'>DÉBLOQUER L'AUDIT COMPLET (499 $)</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('audit-form');
        const submitBtn = document.getElementById('submit-btn');
        const loadingZone = document.getElementById('loading-zone');
        const formContainer = document.getElementById('audit-form-container');
        const resultContainer = document.getElementById('result-container');
        const reportPre = document.getElementById('audit-report');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('target_url').value;
            const email = document.getElementById('client_email').value;

            // UI Switch
            form.classList.add('hidden');
            loadingZone.classList.remove('hidden');

            try {
                const response = await fetch('https://novasuite-1.onrender.com/api/audit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, email })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    formContainer.classList.add('hidden');
                    resultContainer.classList.remove('hidden');
                    reportPre.textContent = data.report;
                } else {
                    alert('Erreur : ' + data.message);
                    form.classList.remove('hidden');
                    loadingZone.classList.add('hidden');
                }
            } catch (err) {
                alert('Le serveur Nova est en mode veille. Réessayez dans 20 secondes.');
                form.classList.remove('hidden');
                loadingZone.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
