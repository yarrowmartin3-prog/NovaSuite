<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact • NovaSuite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { neon: '#00ff41', gold: '#ffd700' } } } }</script>
</head>
<body class="bg-[#050505] text-white min-h-screen flex flex-col font-sans antialiased">
    <header class="p-6 max-w-6xl mx-auto w-full flex justify-between items-center z-10">
        <a href="index.html" class="flex items-center gap-3">
            <img src="assets/logo-novasuite.webp" class="w-10 h-10 rounded-lg border border-gray-800" alt="NovaSuite">
            <span class="text-xl font-black uppercase tracking-tighter">NovaSuite</span>
        </a>
        <a href="index.html" class="text-[10px] border border-gray-700 px-4 py-2 rounded-full uppercase font-bold hover:border-white transition">Retour</a>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-[#0f172a]/80 backdrop-blur p-8 rounded-3xl border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Contact Direct</h2>
            <form id="contact-form" class="space-y-4">
                <input type="text" id="nom" placeholder="Nom / Entreprise" required class="w-full p-4 bg-black border border-gray-800 rounded-xl outline-none focus:border-neon text-sm shadow-inner text-neon font-mono">
                <input type="email" id="email" placeholder="Courriel" required class="w-full p-4 bg-black border border-gray-800 rounded-xl outline-none focus:border-neon text-sm shadow-inner text-neon font-mono">
                <textarea id="msg" placeholder="Votre projet..." required class="w-full p-4 bg-black border border-gray-800 rounded-xl outline-none focus:border-neon text-sm h-32 shadow-inner text-neon font-mono"></textarea>
                <button type="submit" class="w-full bg-neon text-black font-black py-4 rounded-xl uppercase text-sm tracking-widest hover:bg-white transition">Envoyer à l'Architecte</button>
            </form>
        </div>
    </main>

    <footer class="py-10 text-center text-[9px] text-gray-600 uppercase tracking-widest border-t border-gray-900 mt-auto">
        <button type="button" onclick="showCookieBanner()" id="btn-cookies" class="hover:text-neon transition font-bold uppercase">Préférences Cookies</button>
    </footer>

    <div id="cookie-banner" class="fixed bottom-4 left-4 right-4 md:right-auto md:w-96 bg-[#0f172a]/95 backdrop-blur border-l-4 border-neon border border-white/10 p-6 rounded-2xl shadow-2xl z-[999999] hidden">
        <h3 class="text-white font-bold text-sm mb-2 uppercase tracking-tighter">🛡️ Conformité</h3>
        <p class="text-[10px] text-gray-400 mb-4">Logique de consentement actif requise.</p>
        <div class="flex gap-3">
            <button onclick="acceptCookies()" class="flex-1 bg-neon text-black text-[10px] font-black py-2.5 rounded-lg uppercase hover:bg-white transition">Accepter</button>
            <button onclick="declineCookies()" class="flex-1 border border-gray-700 text-gray-500 text-[10px] font-bold py-2.5 rounded-lg hover:bg-gray-800 transition uppercase">Refuser</button>
        </div>
    </div>

    <div id="chatbot-modal" class="fixed bottom-24 right-4 md:right-6 w-80 md:w-96 bg-[#0f172a] border border-neon rounded-2xl shadow-[0_0_30px_rgba(0,255,65,0.2)] z-[99999] hidden flex-col overflow-hidden">
        <div class="bg-black p-4 border-b border-white/10 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-neon animate-pulse"></div>
                <span class="font-black text-white uppercase tracking-widest text-sm">NovaSuite IA</span>
            </div>
            <button onclick="toggleChat()" class="text-gray-500 hover:text-neon transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="h-80 p-4 overflow-y-auto flex flex-col gap-3 text-sm font-mono text-gray-300" id="chat-messages">
            <div class="bg-black/50 p-3 rounded-xl border border-white/5 w-10/12">
                > Initialisation des protocoles souverains...<br><br>Bonjour. Je suis l'agent IA de NovaSuite. Comment puis-je vous assister aujourd'hui ?
            </div>
        </div>
        <div class="p-4 bg-black border-t border-white/10 flex gap-2">
            <input type="text" id="chat-input" placeholder="Tapez votre message..." class="flex-1 bg-[#050505] border border-gray-800 rounded-lg px-3 py-2 text-neon outline-none focus:border-neon text-xs">
            <button class="bg-neon text-black px-4 py-2 rounded-lg font-black hover:bg-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </div>
    </div>

    <button onclick="toggleChat()" class="fixed bottom-6 right-6 z-[90000] flex items-center justify-center bg-neon text-black hover:bg-white transition-all shadow-[0_0_20px_rgba(0,255,65,0.4)] rounded-full h-14 w-14 md:h-auto md:w-auto md:px-6 md:py-3 cursor-pointer transform hover:scale-105">
        <svg class="w-6 h-6 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
        <span class="hidden md:block font-black uppercase tracking-widest text-xs">Chatbot IA</span>
    </button>

    <script>
        document.addEventListener("DOMContentLoaded", () => { try { if (localStorage.getItem("ns_consent") !== "accepted" && localStorage.getItem("ns_consent") !== "declined") { document.getElementById("cookie-banner").classList.remove("hidden"); } } catch(e) { document.getElementById("cookie-banner").classList.remove("hidden"); } });
        function acceptCookies() { try { localStorage.setItem("ns_consent", "accepted"); } catch(e) {} document.getElementById("cookie-banner").classList.add("hidden"); }
        function declineCookies() { try { localStorage.setItem("ns_consent", "declined"); } catch(e) {} document.getElementById("cookie-banner").classList.add("hidden"); }
        function showCookieBanner() { document.getElementById("cookie-banner").classList.remove("hidden"); }
        function toggleChat() {
            const modal = document.getElementById("chatbot-modal");
            if (modal.classList.contains("hidden")) { modal.classList.remove("hidden"); modal.classList.add("flex"); } else { modal.classList.add("hidden"); modal.classList.remove("flex"); }
        }
    </script>
</body>
</html>
