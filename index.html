<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaSuite • Infrastructure IA & Loi 25</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #111111; --text: #eeeeee; --gray: #888888; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; line-height: 1.6; }
        .wrap { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        header { padding: 30px 0; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .logo-img { width: 50px; height: auto; border-radius: 4px; }
        .logo-text { font-weight: bold; font-size: 1.5rem; color: #fff; margin-left: 15px; }

        .hero { text-align: center; padding: 80px 20px; background: radial-gradient(circle, #111 0%, #050505 100%); }
        h1 { font-size: 2.5rem; color: #fff; margin: 0; }
        .hero p { color: var(--gray); font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 40px 0; }
        .card { background: var(--card); padding: 30px; border: 1px solid #222; text-align: center; border-radius: 8px; }
        .card:hover { border-color: var(--neon); }
        .price { font-size: 2rem; font-weight: bold; color: #fff; margin: 15px 0; }
        
        .btn { display: inline-block; padding: 12px 24px; font-weight: bold; text-decoration: none; border-radius: 4px; cursor: pointer; }
        .btn-white { background: #fff; color: #000; }
        .btn-gold { background: #ffd700; color: #000; }

        /* CHAT 🧠 */
        #nova-trigger { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #nova-ui { display: none; position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px; background: #000; border: 1px solid #333; z-index: 9999; border-radius: 8px; flex-direction: column; font-family: monospace; }
        .n-h { background: #111; padding: 10px; color: #fff; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .n-b { flex: 1; padding: 15px; overflow-y: auto; font-size: 12px; color: #aaa; display: flex; flex-direction: column; gap: 8px; }
        .n-m { padding: 8px; border-radius: 4px; max-width: 85%; }
        .n-r { background: #111; border-left: 2px solid var(--neon); align-self: flex-start; }
        .n-u { background: #333; align-self: flex-end; color: #fff; }

        /* BANDEAU LOI 25 */
        #cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; color: #000; padding: 20px; z-index: 10000; display: none; border-top: 2px solid var(--neon); }
        .c-content { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header class="wrap">
    <img src="./assets/logo-novasuite.webp" class="logo-img" alt="Logo">
    <span class="logo-text">NovaSuite</span>
</header>

<section class="hero">
    <h1>Souveraineté Numérique</h1>
    <p>Conformité Loi 25 & IA Locale au Québec.</p>
</section>

<main class="wrap">
    <div class="grid">
        <div class="card">
            <h3>Audit Express</h3>
            <div class="price">499 $</div>
            <a href="mailto:contact@novasuite.ca" class="btn btn-white">Commander</a>
        </div>
        <div class="card" style="border-color: #ffd700;">
            <h3 style="color:#ffd700;">Partenaires MSP</h3>
            <div class="price">Enterprise</div>
            <a href="./partenaires-msp.html" class="btn btn-gold">Accès Term Sheet</a>
        </div>
    </div>
</main>

<div id="cookie-banner">
    <div class="c-content">
        <span><strong>Loi 25</strong> : Données souveraines au Québec.</span>
        <button onclick="acceptCookies()" style="padding: 10px; background:#000; color:#fff; border:none; cursor:pointer;">J'ACCEPTE</button>
    </div>
</div>

<div id="nova-trigger" onclick="toggleN()">🧠</div>
<div id="nova-ui">
    <div class="n-h"><span>NOVA_SYSTEM</span><span onclick="toggleN()" style="cursor:pointer">×</span></div>
    <div class="n-b" id="n-log"><div class="n-m n-r">Noyau chargé. Prêt pour l'audit.</div></div>
</div>

<footer class="wrap" style="text-align:center; padding: 40px; font-size: 0.8rem; color:#444;">
    <a href="mentions-legales.html" style="color:#666;">Mentions Légales</a> | © 2026 NovaSuite
</footer>

<script>
    function checkLoi25() { if(!localStorage.getItem('n_c')) document.getElementById('cookie-banner').style.display='block'; }
    function acceptCookies() { localStorage.setItem('n_c','1'); document.getElementById('cookie-banner').style.display='none'; }
    function toggleN() { var u=document.getElementById('nova-ui'); u.style.display=(u.style.display==='flex')?'none':'flex'; }
    window.onload = checkLoi25;
</script>

</body>
</html>
